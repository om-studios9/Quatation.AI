<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuoteGenerator | Professional Tool</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @media print {
            .no-print { display: none; }
            body { background: white; padding: 0; }
        }
    </style>
</head>
<body class="bg-slate-100 min-h-screen py-10 px-4">

    <div id="app" class="max-w-2xl mx-auto bg-white p-8 rounded-xl shadow-lg border border-slate-200">
        <!-- Header -->
        <div class="no-print mb-8">
            <h1 class="text-2xl font-bold text-slate-800">Quotation Generator</h1>
            <p class="text-slate-500">Fill details to generate your professional quote.</p>
        </div>

        <!-- Input Form -->
        <div class="no-print grid grid-cols-1 gap-4 mb-8">
            <input type="text" id="bizName" placeholder="Business/Company Name" class="p-3 border rounded-md w-full focus:ring-2 focus:ring-slate-900 outline-none">
            <input type="text" id="clientName" placeholder="Client Name" class="p-3 border rounded-md w-full">
            <textarea id="projectDesc" placeholder="Project Scope / Description" class="p-3 border rounded-md w-full h-24"></textarea>
            <input type="number" id="amount" placeholder="Total Amount (₹)" class="p-3 border rounded-md w-full">
            <button onclick="generateQuote()" class="bg-slate-900 text-white py-3 rounded-md font-bold hover:bg-slate-700 transition">Generate Preview</button>
        </div>

        <!-- Output Section (Optimized for Printing) -->
        <div id="quoteResult" class="hidden border-t-4 border-slate-900 pt-6">
            <div class="flex justify-between items-start mb-10">
                <div>
                    <h2 id="dispBiz" class="text-3xl font-extrabold uppercase tracking-tight"></h2>
                    <p class="text-slate-400">Official Quotation</p>
                </div>
                <div class="text-right">
                    <p class="text-sm text-slate-500">Date</p>
                    <p id="dispDate" class="font-bold"></p>
                </div>
            </div>

            <div class="mb-10">
                <p class="text-slate-500 text-sm">Bill To:</p>
                <p id="dispClient" class="text-xl font-semibold"></p>
            </div>

            <div class="mb-10 p-4 bg-slate-50 rounded">
                <p class="text-slate-700 whitespace-pre-line" id="dispDesc"></p>
            </div>

            <div class="flex justify-between items-center border-t pt-6">
                <span class="text-xl">Total Amount:</span>
                <span class="text-3xl font-bold">₹<span id="dispAmount"></span></span>
            </div>
            
            <button onclick="window.print()" class="no-print mt-8 w-full bg-green-600 text-white py-2 rounded shadow hover:bg-green-700">Save as PDF</button>
        </div>
    </div>

    <script>
        function generateQuote() {
            document.getElementById('dispBiz').innerText = document.getElementById('bizName').value || "YOUR BUSINESS";
            document.getElementById('dispClient').innerText = document.getElementById('clientName').value || "Valued Client";
            document.getElementById('dispDesc').innerText = document.getElementById('projectDesc').value || "No description provided.";
            document.getElementById('dispAmount').innerText = document.getElementById('amount').value || "0.00";
            document.getElementById('dispDate').innerText = new Date().toLocaleDateString();
            document.getElementById('quoteResult').classList.remove('hidden');
        }
    </script>
</body>
</html>
